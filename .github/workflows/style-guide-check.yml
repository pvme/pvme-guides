name: Check Style Guide

on:
  push:
    branches:
      - "**"
  pull_request_target:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  style-guide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (push)
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout (PR head)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run style guide checks on changed txt files
        id: style
        shell: bash
        run: |
          REPORT=/tmp/style-guide-report.txt
          : > "$REPORT"

          get_changed_txt_files() {
            if [ "${{ github.event_name }}" = "pull_request_target" ]; then
              git diff --name-only --diff-filter=ACMRT \
                "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
                | grep -E '\.txt$' || true
            else
              BEFORE="${{ github.event.before }}"
              AFTER="${{ github.sha }}"

              if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
                git diff-tree --no-commit-id --name-only -r --diff-filter=ACMRT "$AFTER" \
                  | grep -E '\.txt$' || true
              else
                git diff --name-only --diff-filter=ACMRT "$BEFORE" "$AFTER" \
                  | grep -E '\.txt$' || true
              fi
            fi
          }

          mapfile -t files < <(get_changed_txt_files)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed .txt files found"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${files[@]}"; do
            [ -f "$file" ] || continue
            echo "Checking $file"

            awk -v file="$file" '
              function emit(rule, line_no, snippet) {
                printf "%s:%d:%s:%s\n", file, line_no, rule, snippet
              }

              function is_allowed_prefix_char(c) {
                return index("\\`\"'\''[](){}.,!?;:_*-", c) > 0
              }

              function is_allowed_suffix_char(c) {
                return index("\\`\"'\''[](){}.,!?;:_*-", c) > 0
              }

              {
                line = $0

                # Rule: no level 4 headings
                if (line ~ /^####([[:space:]].*|$)/) {
                  emit("No level 4 headings", NR, line)
                }

                # Rule: no bold text inside headings
                if (line ~ /^#{1,6}[[:space:]]+.*\*\*.*\*\*.*/) {
                  emit("Do not bold text in headings", NR, line)
                }

                # Rule: emoji spacing
                remaining = line
                offset = 0

                while (match(remaining, /[^[:space:]]<:[^:<>]+:[0-9]+>|<:[^:<>]+:[0-9]+>[^[:space:]]/)) {
                  match_text = substr(remaining, RSTART, RLENGTH)
                  full_start = offset + RSTART
                  skip = 0

                  # 1) skip if emoji is inside markdown link text
                  if (line ~ /\[[^]]*<:[^:<>]+:[0-9]+>[^]]*\]\([^)]*\)/) {
                    skip = 1
                  }

                  # 2) skip if prefixed by r, s or _ at BOF or after space
                  if (!skip && match_text ~ /^[rs_]<:/) {
                    if (full_start == 1 || substr(line, full_start - 1, 1) ~ /[[:space:]]/) {
                      skip = 1
                    }
                  }

                  # 3) skip if prefixed by allowed punctuation
                  if (!skip && match_text ~ /^.<:/) {
                    first_char = substr(match_text, 1, 1)
                    if (is_allowed_prefix_char(first_char)) {
                      skip = 1
                    }
                  }

                  # 4) skip if prefixed by literal \u200B or \n
                  if (!skip && line ~ /(\\u200B|\\u200b|\\n)<:[^:<>]+:[0-9]+>/) {
                    skip = 1
                  }

                  # 5) skip if inside backticks
                  if (!skip) {
                    bt_pattern = "`[^`]*" match_text "[^`]*`"
                    if (line ~ bt_pattern) {
                      skip = 1
                    }
                  }

                  # 6) skip if followed by allowed punctuation
                  if (!skip && match_text ~ /^<:[^:<>]+:[0-9]+>./) {
                    last_char = substr(match_text, length(match_text), 1)
                    if (is_allowed_suffix_char(last_char)) {
                      skip = 1
                    }
                  }

                  if (!skip) {
                    emit("Emoji spacing", NR, match_text)
                  }

                  offset += RSTART + RLENGTH - 1
                  remaining = substr(remaining, RSTART + RLENGTH)
                }
              }
            ' "$file" >> "$REPORT"
          done

          if [ -s "$REPORT" ]; then
            cp "$REPORT" style-guide-report.txt
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR comment
        if: github.event_name == 'pull_request_target' && steps.style.outputs.found == 'true'
        shell: bash
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          {
            echo "## Style guide issues found"
            echo
            echo "The following lines break the PvME style guide:"
            echo
          } > style-guide-comment.txt

          while IFS=: read -r file lineno rule snippet; do
            [ -n "$file" ] || continue
            url="https://github.com/${HEAD_REPO}/blob/${HEAD_REF}/${file}#L${lineno}"
            safe_snippet=$(printf '%s' "$snippet" | sed 's/`/\\`/g')
            echo "- [\`${file}:${lineno}\`](${url}) — **${rule}** — \`${safe_snippet}\`" >> style-guide-comment.txt
          done < style-guide-report.txt

          {
            echo
            echo "Fix these by making another commit to the same branch as this Pull Request:"
            echo "- Replace any level 4 heading like \`#### Heading\` with a lower heading level or normal body text"
            echo "- Remove bold formatting from headings"
            echo "- Add spaces around custom emojis unless they are intentionally adjacent to allowed punctuation, quotes, backslashes, markdown syntax, or the approved prefixes \`r\`, \`s\`, or \`_\`"
            echo
            echo "### Rules checked"
            echo "- No \`####\` headings"
            echo "- No \`**bold**\` inside headings"
            echo "- Custom emojis must be spaced correctly"
            echo
            echo "<hr>"
            echo
            echo "<details>"
            echo "<summary><small>Raw style-check output:</small></summary>"
            echo
            echo '```'
            cat style-guide-report.txt
            echo '```'
            echo "</details>"
          } >> style-guide-comment.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request_target' && steps.style.outputs.found == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: style-guide-comment.txt
          edit-mode: replace

      - name: Fail if issues found
        if: steps.style.outputs.found == 'true'
        run: exit 1
