name: Spellcheck

on:
  push:
    branches:
      - "**"
  pull_request_target:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (push)
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Keep the spelling rules from the trusted base branch.  A contributor's
      # fork is checked out separately below only so its .txt content can be read.
      - name: Checkout trusted spelling rules
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-rules
          persist-credentials: false

      - name: Checkout PR text files
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-content
          fetch-depth: 1
          persist-credentials: false
          # This workflow only reads .txt files from the fork; it never runs
          # scripts, installs dependencies, or uses configuration from the fork.
          allow-unsafe-pr-checkout: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cspell + dictionaries
        run: |
          npm install -g \
            cspell@latest \
            @cspell/dict-software-terms \
            @cspell/dict-gaming-terms

      - name: List changed PR text files
        if: github.event_name == 'pull_request_target'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            --jq '.[].filename' > /tmp/changed-txt-files.txt

      - name: Run spellcheck on changed txt files
        id: spell
        shell: bash
        run: |
          REPORT=/tmp/spellcheck.txt
          CONTENT_DIR=.
          CSPELL_CONFIG=.github/cspell/cspell.json
          EXTRA_WORDS=.github/cspell/allow.txt

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            CONTENT_DIR=pr-content
            CSPELL_CONFIG="$GITHUB_WORKSPACE/trusted-rules/.github/cspell/cspell.json"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              git diff-tree --no-commit-id --name-only -r --diff-filter=ACMRT "$AFTER" \
                > /tmp/changed-txt-files.txt
            else
              git diff --name-only --diff-filter=ACMRT "$BEFORE" "$AFTER" \
                > /tmp/changed-txt-files.txt
            fi
          fi

          # The workflow-owned config is used even for fork PRs. Only existing
          # .txt files are passed to cspell, as plain data. The PR's allow-list
          # remains usable so editors can propose new project words for review.
          (
            cd "$CONTENT_DIR"
            cspell_args=(--config "$CSPELL_CONFIG")
            if [ -f "$EXTRA_WORDS" ]; then
              cspell_args+=(--words "$EXTRA_WORDS")
            fi
            while IFS= read -r file; do
              [ -f "$file" ] && [[ "$file" == *.txt ]] && printf '%s\n' "$file"
            done < /tmp/changed-txt-files.txt \
              | cspell \
                  "${cspell_args[@]}" \
                  --file-list stdin \
                  --no-progress \
                  --no-summary \
                  --relative \
                  | tee "$REPORT" || true
          )

          if grep -q "Unknown word" "$REPORT"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            cp "$REPORT" spellcheck.txt
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR comment
        if: github.event_name == 'pull_request_target' && steps.spell.outputs.found == 'true'
        shell: bash
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          {
            echo "## Spelling issues found"
            echo
            echo "Some words were not recognised by the spellchecker:"
            echo
          } > spellcheck-comment.txt

          while IFS= read -r line; do
            file=$(printf '%s\n' "$line" | sed -n 's/^\([^:]*\):\([0-9][0-9]*\):\([0-9][0-9]*\) - Unknown word (\([^)]*\)).*$/\1/p')
            lineno=$(printf '%s\n' "$line" | sed -n 's/^\([^:]*\):\([0-9][0-9]*\):\([0-9][0-9]*\) - Unknown word (\([^)]*\)).*$/\2/p')
            word=$(printf '%s\n' "$line" | sed -n 's/^\([^:]*\):\([0-9][0-9]*\):\([0-9][0-9]*\) - Unknown word (\([^)]*\)).*$/\4/p')

            if [ -n "$file" ] && [ -n "$lineno" ] && [ -n "$word" ]; then
              url="https://github.com/${HEAD_REPO}/blob/${HEAD_REF}/${file}#L${lineno}"
              echo "- [\`${file}:${lineno}\`](${url}) — Unknown word \`${word}\`" >> spellcheck-comment.txt
            fi
          done < spellcheck.txt

          {
            echo
            echo "Do one of the following by making another commit to the same branch as this Pull Request:"
            echo "- If it is a typo, simply correct it in the file"
            echo "- If the word is valid for this project, add it to \`.github/cspell/allow.txt\`"
            echo
            echo "<hr>"
            echo
            echo "<details>"
            echo "<summary><small>Raw spellcheck output:</small></summary>"
            echo
            echo '```'
            cat spellcheck.txt
            echo '```'
            echo "</details>"
          } >> spellcheck-comment.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request_target' && steps.spell.outputs.found == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: spellcheck-comment.txt
          edit-mode: replace

      - name: Fail if issues found
        if: steps.spell.outputs.found == 'true'
        run: exit 1
